<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flipbook Prototype</title>
  <link href="emojiency.css" rel="stylesheet">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css?family=Ultra&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css?family=Chivo:300,300i,400,400i,700,700i,900,900i&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css?family=Roboto+Mono&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css?family=Lobster&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Maiden+Orange&display=swap" rel="stylesheet">	
</head>

<style>
	body {
	  margin: 0;
	  background: #f9f3e4;
	  color: #3c2c1e;
	  font-family: 'Ultra', serif;
	  text-align: center;
	}

	.container {
	  max-width: 500px;
	  margin: 1em auto;
	  background-color: #fff8dc;
	  padding: 0 30px 30px 30px;
	  border: 10px solid #3c2c1e;
	  box-shadow: 0 0 30px rgba(0,0,0,0.3);
	}

	h2 {
		font-family: 'Rye', serif;
		font-weight: 100;
	  font-size: 2.5rem;
		letter-spacing: 0.02rem;
		margin-top: 5px;
	  margin-bottom: 0;
	}

	h3 {
	  font-family: 'Lobster', serif;
	  font-size: 2.9rem;
	  margin-top: 0;
	  margin-bottom: 0.5rem;
	}

	h4 {
	  font-family: 'Rye', serif;
	  font-size: 3.5rem;
	  margin-top: .5rem;
	  margin-bottom: 0;
	}

	.tagline {
	  font-family: 'Maiden Orange', serif;
	  line-height: 1.4;
	  margin: 0.5rem 0;
	}

	h1.tagline {
		margin-top: 1rem;
	  font-size: 2.4rem;
	  font-weight: 500;
		line-height: 1.75rem;
	}

	h2.tagline {
		margin-top: 1rem;
	  font-size: 1.6rem;
	  font-weight: 400;
		line-height: 1.4rem;
	}

	.tagline strong {
	  font-family: 'Rye', serif;
	  font-weight: normal;
	  text-transform: uppercase;
	  letter-spacing: 0.05em;
	}

	.buttons {
	  margin-top: 15px;
	  display: flex;
	  justify-content: center;
	  gap: 10px;
	}

	.buttons a {
	  padding: 8px 12px;
	  background: #AAAAAA;
	  color: #fff8dc;
	  font-family: 'Roboto Mono', monospace;
	  text-decoration: none;
	  font-size: 0.9rem;
	  border-radius: 4px;
	  border: solid 1px #3c2c1e;
	  transition: background-color 0.2s;
	}

	.buttons a:hover {
	  background: #5a3f2a;
	}

	.svg-wrapper {
	  margin: 0 auto;
	  padding: 0;
	  line-height: 0;
	  display: flex;
	  justify-content: center;
	  align-items: center;
	}

	.svg-wrapper svg {
	  display: block;
	  width: 100%;
	  max-width: 500px;
	  height: 425px;
	}

	svg text {
	  font-family: 'Ultra', serif;
	  font-weight: 700;
	  letter-spacing: -2px;
	  text-transform: uppercase;
	}

	.rotating-circle {
	  animation: rotateCircle 30s linear infinite;
	  transform-origin: center;
	}

	.centered-headshot {
	  transform: rotate(5deg);
	  transform-origin: center;
	  clip-path: circle(50%);
	}

	.nav-bar {
	  display: flex;
	  justify-content: center;
	  align-items: center;
	  padding: 1rem;
	  background: #fff8dc;
	  border-bottom: 1px solid #3c2c1e;
	}

	.breadcrumb {
	  display: flex;
	  gap: 0.5rem;
	  font-family: 'Roboto Mono', monospace;
	}

	.breadcrumb select,
	.breadcrumb button {
	  font-size: 1rem;
	  padding: 0.25rem 0.5rem;
	}

	.book {
	  display: flex;
	  flex-wrap: wrap;
	  max-width: 1000px;
	  margin: 2rem auto;
	  padding: 1rem;
	  background: #fff8dc;
	  border: 1px solid #3c2c1e;
	  box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
	}

	.left-page,
	.right-page {
	  flex: 1 1 45%;
	  padding: 1rem;
	}

	.left-page img,
	.left-page video,
	.left-page audio,
	.left-page iframe {
	  width: 100%;
	  height: auto;
	}

	.left-page audio {
	  display: block;
	  width: 100%;
	  min-height: 40px;
	  margin-top: 1rem;
	}

	@media (max-width: 767px) {
	  .book {
	    flex-direction: column;
	  }
	}

	@keyframes rotateCircle {
	  from { transform: rotate(0deg); }
	  to { transform: rotate(360deg); }
	}

	@media (min-width: 768px) {
	  /* Desktop two-page styles and flip animation */
	}

	@media (max-width: 767px) {
	  /* Mobile single-column stacking styles */
	}
</style>
	
<body>
  <div class="nav-bar">
    <div class="breadcrumb">
      <button id="prevBtn">‹ Prev</button>
      <select id="categorySelect"></select>
      <select id="itemSelect"></select>
      <button id="nextBtn">Next ›</button>
    </div>
  </div>

  <div class="book">
    <div class="left-page" id="media-panel"></div>
    <div class="right-page" id="text-panel"></div>
  </div>

  <script>
    let toc = {};
    let flatList = [];
    let currentIndex = 0;

    const mediaPanel = document.getElementById('media-panel');
    const textPanel = document.getElementById('text-panel');
    const categorySelect = document.getElementById('categorySelect');
    const itemSelect = document.getElementById('itemSelect');

    async function loadTOC() {
      toc = await fetch('content/toc.json').then(res => res.json());

      for (const [cat, items] of Object.entries(toc.categories)) {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        categorySelect.appendChild(opt);

        items.forEach(item => {
          if (typeof item === 'string') {
            flatList.push({ category: cat, file: item });
          }
        });
      }

      categorySelect.addEventListener('change', () => {
        updateItemDropdown(categorySelect.value);
      });
      itemSelect.addEventListener('change', () => {
        const selected = itemSelect.value;
        const index = flatList.findIndex(f => f.file === selected);
        if (index !== -1) loadContentByIndex(index);
      });

      updateItemDropdown(categorySelect.value);
      loadContentByIndex(0);
    }

    function updateItemDropdown(category) {
      itemSelect.innerHTML = '';
      const items = toc.categories[category] || [];
      items.forEach((item) => {
        if (typeof item === 'string') {
          const opt = document.createElement('option');
          opt.value = item;
          opt.textContent = item.replace('.json', '').replace(/-/g, ' ');
          itemSelect.appendChild(opt);
        }
      });
    }

    async function loadContentByIndex(index) {
      currentIndex = index;
      const entry = flatList[index];
      if (!entry) return;

      const res = await fetch(`content/${entry.file}`);
      const content = await res.json();

      mediaPanel.innerHTML = '';
      textPanel.innerHTML = '';
			
      const type = content.type || '';
      if (type.startsWith('image')) {
        const img = document.createElement('img');
        img.src = `content/support/${content.file}`;
        img.alt = content.alt || '';
        mediaPanel.appendChild(img);
      } else if (type.startsWith('audio')) {
				const audio = document.createElement('audio');
				audio.controls = true;
				audio.setAttribute('preload', 'metadata');
				mediaPanel.appendChild(audio);
				audio.src = `content/support/${content.file}`;
      } else if (type.startsWith('video')) {
        const video = document.createElement('video');
        video.controls = true;
        video.src = `content/support/${content.file}`;
        mediaPanel.appendChild(video);
      } else if (type === 'embed' && content.embedType === 'youtube') {
        const iframe = document.createElement('iframe');
        iframe.src = `https://www.youtube.com/embed/${content.embedId}`;
        iframe.setAttribute('allowfullscreen', 'true');
        mediaPanel.appendChild(iframe);
      }

			
      const h2 = document.createElement('h2');
      h2.textContent = content.title;
      const h3 = document.createElement('h3');
      h3.textContent = content.media;
      const p = document.createElement('p');
      p.textContent = content.description;
      textPanel.append(h2, h3, p);

      categorySelect.value = entry.category;
      updateItemDropdown(entry.category);
      itemSelect.value = entry.file;
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentIndex > 0) loadContentByIndex(currentIndex - 1);
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      if (currentIndex < flatList.length - 1) loadContentByIndex(currentIndex + 1);
    });

    loadTOC();
  </script>
</body>
</html>
